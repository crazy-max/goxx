name: update-go

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'
  push:
    branches:
      - 'main'

jobs:
  update:
    runs-on: ubuntu-24.04
    environment: update-go # secrets are gated by this environment
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      -
        name: GitHub auth token from GitHub App
        id: write-app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.XGO_BOT_CLIENT_ID }}
          private-key: ${{ secrets.XGO_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.write-app.outputs.token }}
          fetch-depth: 0
          persist-credentials: false
      -
        name: Install npm deps
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await core.group('Install npm deps', async () => {
              await exec.exec('npm', [
                'install',
                '--prefix',
                `${process.env.RUNNER_TEMP}/update-go`,
                '--no-audit',
                '--no-fund',
                'semver@7.8.0'
              ]);
            });
      -
        name: Update Go versions
        id: update
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const semver = require(path.join(process.env.RUNNER_TEMP, 'update-go', 'node_modules', 'semver'));

            const sourceUrl = 'https://go.dev/dl/?mode=json&include=all';

            function normalizeGoVersion(value) {
              return semver.valid(value.replace(/^go/, ''));
            }

            function isStablePatchRelease(release) {
              const version = normalizeGoVersion(release.version);
              return release.stable === true && version && semver.prerelease(version) === null;
            }

            function formatList(values) {
              const quoted = values.map(value => `\`${value}\``);
              if (quoted.length === 0) {
                return 'nothing';
              }
              if (quoted.length === 1) {
                return quoted[0];
              }
              if (quoted.length === 2) {
                return `${quoted[0]} and ${quoted[1]}`;
              }
              return `${quoted.slice(0, -1).join(', ')}, and ${quoted.at(-1)}`;
            }

            function unique(values) {
              return [...new Set(values)];
            }

            function sortVersions(values) {
              return unique(values)
                .filter(version => semver.valid(version))
                .sort(semver.compare);
            }

            function majorMinor(version) {
              const parsed = semver.parse(version);
              return `${parsed.major}.${parsed.minor}`;
            }

            function workspacePath(relativePath) {
              return path.join(process.env.GITHUB_WORKSPACE, relativePath);
            }

            function readFile(relativePath) {
              return fs.readFileSync(workspacePath(relativePath), 'utf8');
            }

            function writeFile(relativePath, content) {
              fs.writeFileSync(workspacePath(relativePath), content, 'utf8');
            }

            function eolFor(content) {
              return content.includes('\r\n') ? '\r\n' : '\n';
            }

            function formatVersionLines(versions, indent, eol) {
              return versions.map(version => `${indent}${version}`).join(eol) + eol;
            }

            function replaceRequired(content, pattern, replacer, relativePath, field) {
              const match = content.match(pattern);
              if (!match) {
                throw new Error(`Missing ${field} in ${relativePath}`);
              }
              return {
                match,
                content: content.replace(pattern, replacer)
              };
            }

            async function resolveGoVersions() {
              const response = await fetch(sourceUrl);
              if (!response.ok) {
                throw new Error(`Failed to fetch ${sourceUrl}: ${response.status} ${response.statusText}`);
              }
              const releases = await response.json();
              const versions = releases
                .filter(isStablePatchRelease)
                .map(release => normalizeGoVersion(release.version))
                .sort(semver.compare);
              const releaseLines = unique(versions.map(majorMinor));
              if (releaseLines.length < 2) {
                throw new Error(`Expected at least two stable Go release lines from ${sourceUrl}`);
              }
              const previousLine = releaseLines.at(-2);
              const currentLine = releaseLines.at(-1);
              const previousVersions = versions.filter(version => majorMinor(version) === previousLine);
              const currentVersions = versions.filter(version => majorMinor(version) === currentLine);
              return {
                buildVersions: [...previousVersions, ...currentVersions],
                latestCurrent: currentVersions.at(-1),
                latestPrevious: previousVersions.at(-1)
              };
            }

            const {
              buildVersions,
              latestCurrent,
              latestPrevious
            } = await resolveGoVersions();

            core.info(`Resolved Go versions from ${sourceUrl}: ${JSON.stringify(buildVersions, null, 2)}`);
            core.info(`Latest current: ${latestCurrent} and ${latestPrevious} from ${sourceUrl}`);
            core.info(`Latest previous: ${latestPrevious}`);

            const changedFiles = [];
            const previousValues = [];
            const updatedValues = [];

            function updateFile(relativePath, update) {
              const content = readFile(relativePath);
              const updated = update(content);
              if (updated !== content) {
                writeFile(relativePath, updated);
                changedFiles.push(relativePath);
                core.info(`Updated ${relativePath}`);
              } else {
                core.info(`${relativePath} is already up to date`);
              }
            }

            updateFile('Dockerfile', content => {
              const result = replaceRequired(
                content,
                /^(ARG GO_VERSION=")([^"]+)(")$/m,
                (_, prefix, current, suffix) => {
                  previousValues.push(current);
                  if (current !== latestCurrent) {
                    updatedValues.push(latestCurrent);
                  }
                  return `${prefix}${latestCurrent}${suffix}`;
                },
                'Dockerfile',
                'GO_VERSION build argument'
              );
              return result.content;
            });

            updateFile('.github/workflows/build.yml', content => {
              const eol = eolFor(content);
              const result = replaceRequired(
                content,
                /(          INPUT_GO-VERSIONS: \|\r?\n)(?:            \d+\.\d+\.\d+\r?\n)+/m,
                (match, prefix) => {
                  const currentVersions = match.match(/\d+\.\d+\.\d+/g) || [];
                  previousValues.push(...currentVersions);
                  updatedValues.push(...buildVersions.filter(version => !currentVersions.includes(version)));
                  return `${prefix}${formatVersionLines(buildVersions, '            ', eol)}`;
                },
                '.github/workflows/build.yml',
                'INPUT_GO-VERSIONS matrix input'
              );
              return result.content;
            });

            updateFile('.github/workflows/test.yml', content => {
              const eol = eolFor(content);
              let result = replaceRequired(
                content,
                /(        go_version:\r?\n)(?:          - \d+\.\d+\.\d+\r?\n)+(        example:)/m,
                (match, prefix, suffix) => {
                  const currentVersions = match.match(/\d+\.\d+\.\d+/g) || [];
                  const desiredVersions = [latestCurrent, latestPrevious];
                  previousValues.push(...currentVersions);
                  updatedValues.push(...desiredVersions.filter(version => !currentVersions.includes(version)));
                  return `${prefix}${formatVersionLines([latestCurrent, latestPrevious], '          - ', eol)}${suffix}`;
                },
                '.github/workflows/test.yml',
                'go_version test matrix'
              );
              result = replaceRequired(
                result.content,
                /(          - go_version: )\d+\.\d+\.\d+(\r?\n            example: all)/m,
                (match, prefix, suffix) => {
                  const current = match.match(/\d+\.\d+\.\d+/)[0];
                  if (current !== latestCurrent) {
                    updatedValues.push(latestCurrent);
                  }
                  return `${prefix}${latestCurrent}${suffix}`;
                },
                '.github/workflows/test.yml',
                'go_version all example include'
              );
              return result.content;
            });

            if (changedFiles.length === 0) {
              core.info('No workspace changes needed for Go versions');
            }

            const titleVersions = sortVersions(updatedValues);
            const titleTarget = titleVersions.length > 0 ? titleVersions.join(', ') : latestCurrent;
            core.setOutput('title', `chore(deps): update Go to ${titleTarget}`);
            core.setOutput('versions', titleTarget);
            core.setOutput('before', formatList(unique(previousValues)));
            core.setOutput('files', formatList(unique(changedFiles)));
            core.setOutput('source-url', sourceUrl);
      -
        name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          base: main
          branch: deps/go-version
          token: ${{ steps.write-app.outputs.token }}
          commit-message: ${{ steps.update.outputs.title }}
          title: ${{ steps.update.outputs.title }}
          signoff: true
          sign-commits: true
          delete-branch: true
          body: |
            This updates Go to ${{ steps.update.outputs.versions }}.

            The source of truth for this update is ${{ steps.update.outputs.source-url }}.
